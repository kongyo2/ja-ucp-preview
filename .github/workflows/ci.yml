name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # The renderer runs MediaWiki under PHP/WASM (`@php-wasm/node`) at
      # runtime, so no system PHP is required to run the test suite. We still
      # need PHP + composer here to materialize the bundled extensions'
      # `vendor/` trees, because composer.phar requires a PHP CLI to execute.
      - name: Setup PHP 8.3 (composer only)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json
          coverage: none
          tools: composer

      - name: Install Node dependencies
        run: npm ci

      - name: Install bundled MediaWiki extension Composer dependencies
        # TemplateStyles and Wikibase ship without their vendor/ trees in git.
        # The PHP/WASM backend asserts both vendor/autoload.php files exist
        # before booting MediaWiki, so we populate them here. End-user installs
        # pick the vendor/ trees up from the published tarball, where empty
        # .npmignore files override the upstream extensions' .gitignore.
        run: |
          for ext in TemplateStyles Wikibase; do
            ext_dir="vendor/mediawiki-1.39.3/extensions/$ext"
            if [ -f "$ext_dir/composer.json" ] && [ ! -f "$ext_dir/vendor/autoload.php" ]; then
              echo "composer install --no-dev in $ext_dir"
              (cd "$ext_dir" && composer install --no-dev --prefer-dist --no-interaction --no-progress)
            fi
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
